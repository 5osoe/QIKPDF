<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>QikPDF : PDF File Management</title>
    <meta name="description" content="Secure, local PDF management tool. Merge, split, rotate, convert to images, and view metadata directly in your browser. No uploads, 100% private.">
    <meta name="keywords" content="PDF, merge PDF, split PDF, rotate PDF, PDF to image, PDF tools, free PDF editor, QikPDF">
    <meta name="author" content="QNest">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#F3F4F6">
    <link rel="canonical" href="https://qikpdf.vercel.app/">

    <meta property="og:title" content="QikPDF - PDF File Management">
    <meta property="og:description" content="Free and secure PDF tool. 100% local processing, no file uploads to any server.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://qikpdf.vercel.app/">
    <meta property="og:image" content="https://qikpdf.vercel.app/preview.jpg">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="QikPDF - PDF File Management">
    <meta name="twitter:description" content="Free and secure PDF tool. 100% local processing.">
    <meta name="twitter:image" content="https://qikpdf.vercel.app/preview.jpg">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div id="theme-overlay"></div>

    <div id="app-root">

        <header>
            <div class="logo-container" id="logo-home">
                <div class="led"></div>
                <div class="logo-text">QIK PDF <span class="version">v2.0</span></div>
            </div>
            <div class="header-actions" style="display:flex;flex-direction:row;align-items:center;gap:8px;">
                <button class="icon-btn" id="btn-theme" title="Switch Theme">
                    <svg class="theme-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="theme-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button class="icon-btn" id="btn-about" title="System Info">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                </button>
            </div>
        </header>

        <main id="main-view">
            <div class="grid-label">AVAILABLE MODULES</div>
            <div class="grid">
                <button class="tool-card" data-tool="pdfinfo">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                    </div>
                    <span>PDF INFO</span>
                </button>

                <button class="tool-card" data-tool="metadata">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </div>
                    <span>METADATA</span>
                </button>

                <button class="tool-card" data-tool="pdf2img">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    </div>
                    <span>PDF &rarr; IMG</span>
                </button>

                <button class="tool-card" data-tool="img2pdf">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><rect x="9" y="13" width="6" height="6"></rect></svg>
                    </div>
                    <span>IMG &rarr; PDF</span>
                </button>

                <button class="tool-card" data-tool="merge">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                    </div>
                    <span>MERGE</span>
                </button>

                <button class="tool-card" data-tool="split">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </div>
                    <span>SPLIT</span>
                </button>

                <button class="tool-card" data-tool="rotate">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.5 2v6h6M21.5 22v-6h-6"/><path d="M22 11.5A10 10 0 0 0 3.2 7.2M2 12.5a10 10 0 0 0 18.8 4.2"/></svg>
                    </div>
                    <span>ROTATE</span>
                </button>
            </div>
        </main>

        <main id="tool-view" class="hidden">
            <div class="tool-header">
                <button class="icon-btn btn-back" id="btn-back" title="Go Back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>

                <h2 id="tool-title" class="title-with-icon">
                    <span id="tool-title-icon"></span>
                    <span id="tool-title-text">TOOL</span>
                </h2>

                <button class="icon-btn" id="btn-info" title="Details">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                </button>
            </div>

            <div id="drop-zone" class="drop-zone">
                <div class="drop-icon-graphic"></div>
                <span id="drop-text">DROP FILE(S) HERE<br>OR CLICK TO SELECT</span>
                <input type="file" id="file-input" hidden>
            </div>

            <div id="pdf-info-ui" class="hidden tool-panel">
                <div id="pdf-info-content"></div>
            </div>

            <div id="metadata-ui" class="hidden tool-panel">
                <div class="metadata-form">
                    <div class="input-group-col">
                        <label>TITLE</label>
                        <input type="text" id="meta-title" class="input-text">
                    </div>
                    <div class="input-group-col">
                        <label>AUTHOR</label>
                        <input type="text" id="meta-author" class="input-text">
                    </div>
                    <div class="input-group-col">
                        <label>SUBJECT</label>
                        <input type="text" id="meta-subject" class="input-text">
                    </div>
                    <div class="input-group-col">
                        <label>KEYWORDS</label>
                        <input type="text" id="meta-keywords" class="input-text">
                    </div>
                    <div class="input-group-col">
                        <label>CREATOR</label>
                        <input type="text" id="meta-creator" class="input-text">
                    </div>
                    <div class="meta-actions">
                        <button id="btn-meta-clear" class="btn-outline">CLEAR ALL METADATA</button>
                    </div>
                </div>
            </div>

            <div id="pdf2img-ui" class="hidden tool-panel">
                <div class="pdf-toolbar">
                    <div class="toolbar-group">
                        <button class="btn-sm" id="btn-select-all">SELECT ALL</button>
                        <button class="btn-sm" id="btn-select-none">NONE</button>
                    </div>
                    <div class="toolbar-group">
                        <input type="number" id="pdf2img-search" class="mini-input search-input" min="1" placeholder="SEARCH PAGE #">
                    </div>
                </div>
                <div id="pdf-grid" class="pdf-list-container"></div>
            </div>

            <div id="rotate-ui" class="hidden tool-panel">
                <div class="file-label">TARGET: <span id="rotate-filename" class="mono-highlight"></span></div>
                <div class="rotate-grid">
                    <button class="btn-outline rotate-btn" data-angle="-90">
                        <span>&#8634; LEFT</span>
                        <small>90&deg; CCW</small>
                    </button>
                    <button class="btn-outline rotate-btn" data-angle="180">
                        <span>&#8644; FLIP</span>
                        <small>180&deg;</small>
                    </button>
                    <button class="btn-outline rotate-btn" data-angle="90">
                        <span>&#8635; RIGHT</span>
                        <small>90&deg; CW</small>
                    </button>
                </div>
            </div>

            <div id="split-ui" class="hidden tool-panel">
                <div class="file-label">
                    FILE: <span id="split-filename" class="mono-highlight"></span>
                    <br>
                    COUNT: <span id="split-pagecount" class="accent-text">...</span>
                </div>
                <div class="split-modes">
                    <label class="radio-container">
                        <input type="radio" name="split-mode" value="all" checked>
                        <span class="radio-box"></span>
                        <span class="radio-label">ALL (SEPARATE FILES)</span>
                    </label>
                    <label class="radio-container">
                        <input type="radio" name="split-mode" value="custom">
                        <span class="radio-box"></span>
                        <span class="radio-label">CUSTOM RANGES</span>
                    </label>
                </div>
                <div id="split-custom-options" class="hidden">
                    <div class="input-group">
                        <label>NUMBER OF OUTPUT FILES:</label>
                        <input type="number" id="split-range-count" min="1" max="20" value="1" class="input-num">
                    </div>
                    <div id="split-ranges-container"></div>
                </div>
                <div id="split-all-names" class="hidden">
                    <div class="split-all-header">
                        <span>PAGE NAMES — <span id="split-all-count" class="accent-text"></span></span>
                    </div>
                    <div id="split-all-list" class="split-all-list"></div>
                </div>
            </div>

            <div id="reorder-container" class="hidden tool-panel"></div>

            <div id="progress-container" class="hidden">
                <div class="progress-box">
                    <div id="ascii-progress" class="glitch-text">[....................] 0%</div>
                    <div id="status-text">INITIALIZING...</div>
                </div>
            </div>

            <div id="result-container" class="hidden"></div>
        </main>

        <div id="global-actions" class="action-footer hidden">
            <button class="btn-primary" id="btn-process">PROCESS PDF</button>
            <button class="btn-primary hidden" id="btn-download-action">DOWNLOAD</button>
            <button class="btn-outline hidden" id="btn-clear-result">CLEAR</button>
        </div>

        <div id="info-modal" class="modal hidden" data-modal>
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">INFO</h3>
                    <button class="btn-modal-close" id="btn-modal-close">✕</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>

        <div id="export-modal" class="modal hidden" data-modal>
            <div class="modal-content">
                <div class="modal-header">
                    <h3>EXPORT CONFIG</h3>
                    <button class="btn-modal-close" id="btn-export-close">✕</button>
                </div>
                <div class="modal-body">
                    <div class="input-group-col">
                        <label>FILENAME (OPTIONAL)</label>
                        <input type="text" id="export-filename" class="input-text" placeholder="Default Name">
                    </div>

                    <div class="input-group-col" id="export-size-group">
                        <label>PAGE SIZE</label>
                        <div class="select-wrapper">
                            <select id="export-size" class="input-select">
                                <option value="default" selected>ORIGINAL (NO CHANGE)</option>
                                <option value="a4">A4 (ISO)</option>
                                <option value="a3">A3 (ISO)</option>
                                <option value="a5">A5 (ISO)</option>
                                <option value="a0">A0 (ISO)</option>
                                <option value="a1">A1 (ISO)</option>
                                <option value="a2">A2 (ISO)</option>
                                <option value="letter">LETTER (US)</option>
                                <option value="legal">LEGAL (US)</option>
                                <option value="custom">CUSTOM SIZE...</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group-col hidden" id="export-rotation-group">
                        <label>DOCUMENT ROTATION</label>
                        <div class="select-wrapper">
                            <select id="export-rotation" class="input-select">
                                <option value="0" selected>NONE (0&deg;)</option>
                                <option value="90">90&deg; CW</option>
                                <option value="-90">90&deg; CCW</option>
                                <option value="180">180&deg;</option>
                            </select>
                        </div>
                    </div>

                    <div id="custom-size-inputs" class="input-row hidden">
                        <div class="flex-1">
                            <label>WIDTH</label>
                            <input type="number" id="custom-width" class="input-text" placeholder="W">
                        </div>
                        <div class="flex-1">
                            <label>HEIGHT</label>
                            <input type="number" id="custom-height" class="input-text" placeholder="H">
                        </div>
                        <div class="flex-1">
                            <label>UNIT</label>
                            <select id="custom-unit" class="input-select">
                                <option value="mm">mm</option>
                                <option value="cm">cm</option>
                                <option value="inch">in</option>
                            </select>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button class="btn-outline flex-1" id="btn-export-cancel">CANCEL</button>
                        <button class="btn-primary flex-1" id="btn-export-confirm">CONFIRM</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="edit-preview-modal" class="preview-modal hidden">
        <div class="preview-content">
            <button id="preview-close">✕</button>
            <div id="preview-body"></div>
        </div>
    </div>

    <footer class="site-footer">
        <span>Created by <a href="https://qnest.vercel.app" target="_blank" rel="noopener noreferrer" class="footer-link">QNest</a></span>
    </footer>

    <script src="tool-pdfinfo.js"></script>
    <script src="tool-metadata.js"></script>
    <script src="tool-pdf2img.js"></script>
    <script src="tool-img2pdf.js"></script>
    <script src="tool-merge.js"></script>
    <script src="tool-split.js"></script>
    <script src="tool-rotate.js"></script>
    <script src="app.js"></script>
</body>
</html>
